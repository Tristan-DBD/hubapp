name: Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ex: 1.2.3) — laisse vide pour utiliser package.json'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 ndk;27.1.12297006'

      - run: cd android && ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a

      - id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          fi

      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            android/app/build/outputs/apk/release/app-release.apk \
            --generate-notes
